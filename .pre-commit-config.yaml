# Pre-commit hooks for the GRB classification project.
#
# Setup:
#     pip install pre-commit
#     pre-commit install
#
# Mirrors the lint and format gate that CI runs on every PR
# (.github/workflows/pytest.yml job ``unit``); fixing locally before
# committing keeps review noise low.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.ipynb$'
      - id: end-of-file-fixer
        exclude: '\.ipynb$'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        types_or: [python, pyi]
      - id: ruff
        args: ["--fix"]
        types_or: [python, pyi]
